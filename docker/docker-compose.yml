# Agentest Docker Compose - 本番構成
# 開発時は docker-compose.override.yml で上書きされる

services:
  # ===========================================
  # インフラストラクチャ
  # ===========================================

  # PostgreSQL 16
  db:
    image: postgres:16-alpine
    container_name: agentest-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-agentest}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agentest}
      POSTGRES_DB: ${DB_NAME:-agentest}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-agentest} -d ${DB_NAME:-agentest}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 7
  redis:
    image: redis:7-alpine
    container_name: agentest-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-agentest}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-agentest}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO (S3互換ストレージ)
  minio:
    image: minio/minio:latest
    container_name: agentest-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agentest}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-agentest123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # アプリケーション（本番用）
  # ===========================================

  # API サーバー
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: agentest-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-agentest}:${DB_PASSWORD:-agentest}@db:5432/${DB_NAME:-agentest}
      REDIS_URL: redis://:${REDIS_PASSWORD:-agentest}@redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agentest}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-agentest123}
      MINIO_BUCKET: ${MINIO_BUCKET:-agentest}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      API_PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # WebSocket サーバー
  ws:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ws
    container_name: agentest-ws
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-agentest}:${DB_PASSWORD:-agentest}@db:5432/${DB_NAME:-agentest}
      REDIS_URL: redis://:${REDIS_PASSWORD:-agentest}@redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      WS_PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Web フロントエンド
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:3002}
    container_name: agentest-web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Admin 管理画面
  admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile.admin
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    container_name: agentest-admin
    restart: unless-stopped
    ports:
      - "3003:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  default:
    name: agentest-network
