# Agentest Docker Compose - 本番構成
# 開発時は docker-compose.override.yml で上書きされる

# 環境変数ファイル（プロジェクトルートの.envを参照）
# .env.exampleをコピーして.envを作成してください
x-env-file: &env-file
  env_file:
    - ../.env

services:
  # ===========================================
  # インフラストラクチャ
  # ===========================================

  # PostgreSQL 16
  db:
    <<: *env-file
    image: postgres:16-alpine
    container_name: agentest-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-agentest}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agentest}
      POSTGRES_DB: ${DB_NAME:-agentest}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-agentest} -d ${DB_NAME:-agentest}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 7
  redis:
    <<: *env-file
    image: redis:7-alpine
    container_name: agentest-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-agentest}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-agentest}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RustFS (S3互換ストレージ)
  minio:
    <<: *env-file
    image: rustfs/rustfs:latest
    container_name: agentest-minio
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: ${MINIO_ROOT_USER:-agentest}
      RUSTFS_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-agentest123}
      RUSTFS_ADDRESS: "0.0.0.0:9000"
      RUSTFS_CONSOLE_ADDRESS: "0.0.0.0:9001"
      RUSTFS_CONSOLE_ENABLE: "true"
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_EXTERNAL_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_EXTERNAL_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # アプリケーション（本番用）
  # ===========================================

  # API サーバー
  api:
    <<: *env-file
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: agentest-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-agentest}:${DB_PASSWORD:-agentest}@db:5432/${DB_NAME:-agentest}
      REDIS_URL: redis://:${REDIS_PASSWORD:-agentest}@redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agentest}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-agentest123}
      MINIO_BUCKET: ${MINIO_BUCKET:-agentest}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY}
      API_PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # WebSocket サーバー
  ws:
    <<: *env-file
    build:
      context: ..
      dockerfile: docker/Dockerfile.ws
    container_name: agentest-ws
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-agentest}:${DB_PASSWORD:-agentest}@db:5432/${DB_NAME:-agentest}
      REDIS_URL: redis://:${REDIS_PASSWORD:-agentest}@redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      WS_PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MCP サーバー (AI Agent連携)
  mcp:
    <<: *env-file
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
    container_name: agentest-mcp
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-agentest}:${DB_PASSWORD:-agentest}@db:5432/${DB_NAME:-agentest}
      REDIS_URL: redis://:${REDIS_PASSWORD:-agentest}@redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      API_INTERNAL_URL: http://api:3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      PORT: 3004
      # OAuth 2.1 Resource Server (RFC 9728)
      MCP_SERVER_URL: ${MCP_SERVER_URL}
      API_URL: ${API_URL}
    ports:
      - "3004:3004"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Web フロントエンド
  # 本番: nginx (port 80)、開発: vite dev server (port 5173)
  web:
    <<: *env-file
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:3002}
    container_name: agentest-web
    restart: unless-stopped
    depends_on:
      - api

  # Admin 管理画面
  # 本番: nginx (port 80)、開発: vite dev server (port 5174)
  admin:
    <<: *env-file
    build:
      context: ..
      dockerfile: docker/Dockerfile.admin
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    container_name: agentest-admin
    restart: unless-stopped
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  default:
    name: agentest-network
