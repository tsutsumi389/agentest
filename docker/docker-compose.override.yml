# Agentest Docker Compose - 開発用上書き設定
# docker compose up で自動的にこのファイルがマージされる

# 環境変数ファイル参照（親の定義を継承）
x-env-file: &env-file
  env_file:
    - ../.env

services:
  # ===========================================
  # 開発用コマンド実行コンテナ
  # ===========================================

  # pnpmコマンド実行用（完全Docker開発）
  # 使用例: docker compose exec dev pnpm install
  #        docker compose exec dev pnpm test
  #        docker compose exec dev pnpm build
  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: agentest-dev
    stdin_open: true
    tty: true
    working_dir: /app
    volumes:
      - ..:/app
      - pnpm_store:/root/.local/share/pnpm/store
      - node_modules:/app/node_modules
      - node_modules_api:/app/apps/api/node_modules
      - node_modules_ws:/app/apps/ws/node_modules
      - node_modules_web:/app/apps/web/node_modules
      - node_modules_admin:/app/apps/admin/node_modules
      - node_modules_mcp:/app/apps/mcp-server/node_modules
      - node_modules_shared:/app/packages/shared/node_modules
      - node_modules_db:/app/packages/db/node_modules
      - node_modules_auth:/app/packages/auth/node_modules
      - node_modules_storage:/app/packages/storage/node_modules
      - node_modules_ws_types:/app/packages/ws-types/node_modules
      - node_modules_ui:/app/packages/ui/node_modules
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER:-agentest}:${DB_PASSWORD:-agentest}@db:5432/${DB_NAME:-agentest}
      REDIS_URL: redis://:${REDIS_PASSWORD:-agentest}@redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agentest}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-agentest123}
      MINIO_BUCKET: ${MINIO_BUCKET:-agentest}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ===========================================
  # アプリケーション（開発モード上書き）
  # ===========================================

  # API サーバー（開発モード）
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: agentest-api
    command: pnpm --filter @agentest/api dev
    volumes:
      - ..:/app
      - pnpm_store:/root/.local/share/pnpm/store
      - node_modules:/app/node_modules
      - node_modules_api:/app/apps/api/node_modules
      - node_modules_shared:/app/packages/shared/node_modules
      - node_modules_db:/app/packages/db/node_modules
      - node_modules_auth:/app/packages/auth/node_modules
      - node_modules_storage:/app/packages/storage/node_modules
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER:-agentest}:${DB_PASSWORD:-agentest}@db:5432/${DB_NAME:-agentest}
      REDIS_URL: redis://:${REDIS_PASSWORD:-agentest}@redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agentest}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-agentest123}
      MINIO_BUCKET: ${MINIO_BUCKET:-agentest}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      FRONTEND_URL: ${WEB_URL:-http://localhost:3000}
      API_PORT: 3001
      # GitHub OAuth
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL}
      # Google OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # WebSocket サーバー（開発モード）
  ws:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: agentest-ws
    command: pnpm --filter @agentest/ws dev
    volumes:
      - ..:/app
      - pnpm_store:/root/.local/share/pnpm/store
      - node_modules:/app/node_modules
      - node_modules_ws:/app/apps/ws/node_modules
      - node_modules_shared:/app/packages/shared/node_modules
      - node_modules_db:/app/packages/db/node_modules
      - node_modules_auth:/app/packages/auth/node_modules
      - node_modules_ws_types:/app/packages/ws-types/node_modules
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER:-agentest}:${DB_PASSWORD:-agentest}@db:5432/${DB_NAME:-agentest}
      REDIS_URL: redis://:${REDIS_PASSWORD:-agentest}@redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret}
      WS_PORT: 3002
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # MCP サーバー（開発モード）
  mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: agentest-mcp
    command: pnpm --filter @agentest/mcp-server dev
    volumes:
      - ..:/app
      - pnpm_store:/root/.local/share/pnpm/store
      - node_modules:/app/node_modules
      - node_modules_mcp:/app/apps/mcp-server/node_modules
      - node_modules_shared:/app/packages/shared/node_modules
      - node_modules_db:/app/packages/db/node_modules
      - node_modules_auth:/app/packages/auth/node_modules
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER:-agentest}:${DB_PASSWORD:-agentest}@db:5432/${DB_NAME:-agentest}
      REDIS_URL: redis://:${REDIS_PASSWORD:-agentest}@redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-32-characters-long}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-32-characters-long}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-development-internal-api-secret-32ch}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      PORT: 3004
      # OAuth 2.1 Resource Server (RFC 9728)
      MCP_SERVER_URL: ${MCP_SERVER_URL:-http://localhost:3004}
      API_URL: ${API_URL:-http://localhost:3001}
      API_INTERNAL_URL: http://api:3001
    ports:
      - "${MCP_EXTERNAL_PORT:-3004}:3004"
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Web フロントエンド（開発モード - Vite dev server）
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: agentest-web
    command: pnpm --filter @agentest/web dev
    volumes:
      - ..:/app
      - pnpm_store:/root/.local/share/pnpm/store
      - node_modules:/app/node_modules
      - node_modules_web:/app/apps/web/node_modules
      - node_modules_shared:/app/packages/shared/node_modules
    environment:
      NODE_ENV: development
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:3002}
      # Docker内部でのAPIプロキシ先
      VITE_API_PROXY_TARGET: http://api:3001
    ports:
      - "${WEB_EXTERNAL_PORT:-3000}:3000"
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Admin 管理画面（開発モード - Vite dev server）
  admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: agentest-admin
    command: pnpm --filter @agentest/admin dev -- --host --port 5174
    volumes:
      - ..:/app
      - pnpm_store:/root/.local/share/pnpm/store
      - node_modules:/app/node_modules
      - node_modules_admin:/app/apps/admin/node_modules
    environment:
      NODE_ENV: development
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    ports:
      - "${ADMIN_EXTERNAL_PORT:-3003}:5174"
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5174"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ===========================================
  # Mailpit（開発・ステージング用メールサーバー）
  # ===========================================
  mailpit:
    image: axllent/mailpit:latest
    container_name: agentest-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_WEB_PORT:-8025}:8025"   # Web UI
      - "${MAILPIT_SMTP_PORT:-1025}:1025"  # SMTP
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025/api/v1/info"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pnpm_store:
  node_modules:
  node_modules_api:
  node_modules_ws:
  node_modules_web:
  node_modules_admin:
  node_modules_mcp:
  node_modules_shared:
  node_modules_db:
  node_modules_auth:
  node_modules_storage:
  node_modules_ws_types:
  node_modules_ui:
